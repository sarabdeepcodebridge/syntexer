<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntexer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark px-4">
        <a class="navbar-brand fw-bold" href="/">Syntexer</a>
        <span class="text-secondary">Adaptive Language Transfer Platform</span>
    </nav>

    <div class="container mt-5">
        <h2 class="fw-bold mb-4">Interview Problems</h2>
        <div class="row">
            {% for problem in problems %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <span class="badge bg-secondary mb-2">{{ problem.topic }}</span>
                        <h5 class="card-title">{{ problem.title }}</h5>
                        <p class="text-muted small">Difficulty: {{ problem.difficulty }}</p>
                        <a href="/problem/{{ problem.id }}" class="btn btn-dark btn-sm">View Solution</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
