<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Syntaxer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #16161e;
            --bg-hover: #1e1e28;
            --border: #2a2a3a;
            --border-hover: #3a3a5a;
            --text-primary: #e8e8f0;
            --text-secondary: #8888aa;
            --text-muted: #555570;
            --accent: #7c6af7;
            --accent-hover: #9580ff;
            --accent-glow: rgba(124, 106, 247, 0.15);
            --green: #22c55e;
            --orange: #f97316;
            --red: #ef4444;
            --blue: #3b82f6;
            --yellow: #eab308;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: rgba(10, 10, 15, 0.95) !important;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-brand {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary) !important;
            letter-spacing: -0.5px;
        }

        .navbar-brand span {
            color: var(--accent);
        }

        .nav-link {
            color: var(--text-secondary) !important;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 14px !important;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-link:hover {
            color: var(--text-primary) !important;
            background: var(--bg-hover);
        }

        .nav-link.active {
            color: var(--accent) !important;
        }

        /* Search bar */
        .search-form {
            position: relative;
        }

        .search-input {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 10px;
            padding: 8px 16px 8px 38px;
            font-size: 14px;
            width: 220px;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg-hover);
            width: 260px;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .search-input::placeholder { color: var(--text-muted); }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Cards */
        .card-base {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            transition: all 0.25s;
            text-decoration: none;
            color: var(--text-primary);
            display: block;
        }

        .card-base:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(124, 106, 247, 0.12);
            color: var(--text-primary);
        }

        /* Badges */
        .badge-easy { background: rgba(34, 197, 94, 0.12); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2); }
        .badge-medium { background: rgba(249, 115, 22, 0.12); color: #f97316; border: 1px solid rgba(249, 115, 22, 0.2); }
        .badge-hard { background: rgba(239, 68, 68, 0.12); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .badge-topic { background: rgba(124, 106, 247, 0.12); color: var(--accent); border: 1px solid rgba(124, 106, 247, 0.2); }

        .pill {
            font-size: 11px;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        /* Progress bar */
        .progress-track {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 32px;
        }

        .progress-bar-bg {
            background: var(--border);
            border-radius: 6px;
            height: 6px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
            height: 100%;
            border-radius: 6px;
            transition: width 0.8s ease;
        }

        /* Section headers */
        .section-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* Footer */
        footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 80px;
        }

        /* Back button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: all 0.2s;
            margin-bottom: 24px;
        }

        .back-btn:hover {
            color: var(--text-primary);
            border-color: var(--border-hover);
            background: var(--bg-hover);
        }

        /* Code blocks */
        pre[class*="language-"] {
            margin: 0 !important;
            border-radius: 0 0 12px 12px !important;
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 13px !important;
            background: #0d0d14 !important;
            padding: 20px !important;
        }

        .code-header {
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .code-header-python { background: #1a1f35; color: #7eb8f7; border-bottom: 1px solid #2a3060; }
        .code-header-java { background: #1f1a10; color: #f0a500; border-bottom: 1px solid #3a2a00; }

        .code-wrap {
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-up { animation: fadeUp 0.4s ease forwards; }

        .fade-up:nth-child(1) { animation-delay: 0.05s; }
        .fade-up:nth-child(2) { animation-delay: 0.1s; }
        .fade-up:nth-child(3) { animation-delay: 0.15s; }
        .fade-up:nth-child(4) { animation-delay: 0.2s; }
        .fade-up:nth-child(5) { animation-delay: 0.25s; }
        .fade-up:nth-child(6) { animation-delay: 0.3s; }

        /* Divider */
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 40px 0;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Syn<span>taxer</span></a>
        <div class="d-flex align-items-center gap-2 ms-auto">
            <form class="search-form" action="/search" method="get">
                <span class="search-icon">⌕</span>
                <input type="text" name="q" class="search-input" placeholder="Search problems...">
            </form>
            <a href="/" class="nav-link">Home</a>
            <a href="/glossary" class="nav-link">Glossary</a>
        </div>
    </div>
</nav>

{% block content %}{% endblock %}

<footer>
    <div>© 2026 Syntaxer — 17719019 Canada Inc. · Built in Canada 🍁</div>
    <div style="margin-top:6px;font-size:11px;">Python ↔ Java Interview Companion</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
{% block extra_js %}{% endblock %}

</body>
</html>
